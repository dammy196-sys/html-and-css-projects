<!DOCTYPE html>
<html lang="en">

<head>
    <title>JavaScript Alert</title>
</head>

<body>

    <h1>JavaScript Alert Box</h1>

   <!-- Color using color NAME -->
    <font color="red">
        <p>This paragraph is colored using a color name (red).</p>
    </font>

    <!-- Color using HEX CODE -->
    <font color="#3498db">
        <p>This paragraph is colored using a hex code (#3498db - blue).</p>
		
		<font face="Arial" size="6">
        <p>This text uses Arial font at size 2 (small).</p>
		
		 <!-- Bold -->
    <p><b>This text is bold.</b></p>

    <!-- Italic -->
    <p><i>This text is italic.</i></p>

    <!-- Underline -->
    <p><u>This text is underlined.</u></p>
    </font>

    <script src="Basic_JavaScript_1.js"></script>

</body>

</html>
